name: ABI Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  abi-check:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev abi-compliance-checker

      - name: Build and install lingmo-theme
        run: |
          git clone --depth=1 https://github.com/Matrinsoft/lingmo-theme.git /tmp/lingmo-theme
          cmake -S /tmp/lingmo-theme -B /tmp/lingmo-theme/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/lingmo-theme/build --parallel
          cmake --install /tmp/lingmo-theme/build
          rm -rf /tmp/lingmo-theme

      - name: Build current
        run: |
          cmake -B build-current -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF
          cmake --build build-current --parallel
          cp build-current/src/libLingmoControls.so.1 libLingmoControls.so.1.new 2>/dev/null || true

      - name: Checkout base
        run: |
          git fetch origin ${{ github.base_ref || 'main' }}
          git checkout FETCH_HEAD
          cmake -B build-base -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF
          cmake --build build-base --parallel
          cp build-base/src/libLingmoControls.so.1 libLingmoControls.so.1.old 2>/dev/null || true
          git checkout -

      - name: Compare ABI
        run: |
          if [ -f libLingmoControls.so.1.old ] && [ -f libLingmoControls.so.1.new ]; then
            abi-compliance-checker \
              -lib LingmoControls \
              -old libLingmoControls.so.1.old \
              -new libLingmoControls.so.1.new \
              -report-path abi_report.html || true
            echo "ABI report generated"
          else
            echo "No base reference to compare (first commit on branch)"
          fi

      - name: Upload ABI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abi-report
          path: abi_report.html
