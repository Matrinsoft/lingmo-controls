name: ABI Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  abi-check:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev abi-compliance-checker \
            curl jq

      - name: Install lingmo-theme from latest release
        run: |
          curl -sL -o /tmp/lt-release.json \
            https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest
          TAG=$(jq -r '.tag_name' /tmp/lt-release.json)
          DEB_DEV_URL=$(grep -o '"browser_download_url":"[^"]*liblingmotheme-dev[^"]*amd64.deb"' /tmp/lt-release.json | sed 's/.*":"//;s/"$//' | head -1)
          DEB_LIB_URL=$(grep -o '"browser_download_url":"[^"]*liblingmotheme1[^"]*amd64.deb"' /tmp/lt-release.json | grep -v dbgsym | sed 's/.*":"//;s/"$//' | head -1)
          [ -z "$DEB_DEV_URL" ] && DEB_DEV_URL="https://github.com/Matrinsoft/lingmo-theme/releases/download/${TAG}/liblingmotheme-dev_1.0.0_amd64.deb"
          [ -z "$DEB_LIB_URL" ] && DEB_LIB_URL="https://github.com/Matrinsoft/lingmo-theme/releases/download/${TAG}/liblingmotheme1_1.0.0_amd64.deb"
          curl -sL -o /tmp/lingmo-theme-dev.deb "$DEB_DEV_URL"
          curl -sL -o /tmp/lingmo-theme-lib.deb "$DEB_LIB_URL"
          dpkg -i /tmp/lingmo-theme-lib.deb /tmp/lingmo-theme-dev.deb || apt-get install -f -y
          rm -f /tmp/lingmo-theme-*.deb /tmp/lt-release.json

      - name: Build current
        run: |
          cmake -B build-current -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF
          cmake --build build-current --parallel
          cp build-current/src/libLingmoControls.so.1 libLingmoControls.so.1.new 2>/dev/null || true

      - name: Checkout base
        run: |
          git fetch origin ${{ github.base_ref || 'main' }}
          git checkout FETCH_HEAD
          cmake -B build-base -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=OFF
          cmake --build build-base --parallel
          cp build-base/src/libLingmoControls.so.1 libLingmoControls.so.1.old 2>/dev/null || true
          git checkout -

      - name: Compare ABI
        run: |
          if [ -f libLingmoControls.so.1.old ] && [ -f libLingmoControls.so.1.new ]; then
            abi-compliance-checker \
              -lib LingmoControls \
              -old libLingmoControls.so.1.old \
              -new libLingmoControls.so.1.new \
              -report-path abi_report.html || true
            echo "ABI report generated"
          else
            echo "No base reference to compare (first commit on branch)"
          fi

      - name: Upload ABI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abi-report
          path: abi_report.html
