name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install clang-format
        run: apt-get update -qq && apt-get install -y -qq clang-format

      - name: Check code style
        run: |
          find . \( -name '*.cpp' -o -name '*.h' \) \
            -exec bash -c 'diff -q "$1" <(clang-format "$1") > /dev/null' _ {} \; -o \
            -exec bash -c 'echo "Style violation: $1"; exit 1' _ \;

  build:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev \
            curl jq

      - name: Install lingmo-theme from latest release
        run: |
          curl -sL -o /tmp/lt-release.json \
            https://api.github.com/repos/Matrinsoft/lingmo-theme/releases/latest
          TAG=$(jq -r '.tag_name' /tmp/lt-release.json)
          DEB_DEV_URL=$(grep -o '"browser_download_url":"[^"]*liblingmotheme-dev[^"]*amd64.deb"' /tmp/lt-release.json | sed 's/.*":"//;s/"$//' | head -1)
          DEB_LIB_URL=$(grep -o '"browser_download_url":"[^"]*liblingmotheme1[^"]*amd64.deb"' /tmp/lt-release.json | grep -v dbgsym | sed 's/.*":"//;s/"$//' | head -1)
          [ -z "$DEB_DEV_URL" ] && DEB_DEV_URL="https://github.com/Matrinsoft/lingmo-theme/releases/download/${TAG}/liblingmotheme-dev_1.0.0_amd64.deb"
          [ -z "$DEB_LIB_URL" ] && DEB_LIB_URL="https://github.com/Matrinsoft/lingmo-theme/releases/download/${TAG}/liblingmotheme1_1.0.0_amd64.deb"
          curl -sL -o /tmp/lingmo-theme-dev.deb "$DEB_DEV_URL"
          curl -sL -o /tmp/lingmo-theme-lib.deb "$DEB_LIB_URL"
          dpkg -i /tmp/lingmo-theme-lib.deb /tmp/lingmo-theme-dev.deb || apt-get install -f -y
          rm -f /tmp/lingmo-theme-*.deb /tmp/lt-release.json

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DCMAKE_UNITY_BUILD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix install_dir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-controls
          path: install_dir/
