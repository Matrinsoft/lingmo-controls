name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install clang-format
        run: apt-get update -qq && apt-get install -y -qq clang-format

      - name: Check code style
        run: |
          find . \( -name '*.cpp' -o -name '*.h' \) \
            -exec bash -c 'diff -q "$1" <(clang-format "$1") > /dev/null' _ {} \; -o \
            -exec bash -c 'echo "Style violation: $1"; exit 1' _ \;

  build:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
            apt-get install -y -qq \
            cmake ninja-build g++ \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev

      - name: Build and install lingmo-theme
        run: |
          git clone --depth=1 https://github.com/Matrinsoft/lingmo-theme.git /tmp/lingmo-theme
          cmake -S /tmp/lingmo-theme -B /tmp/lingmo-theme/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/lingmo-theme/build --parallel
          cmake --install /tmp/lingmo-theme/build
          rm -rf /tmp/lingmo-theme

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DCMAKE_UNITY_BUILD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix install_dir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-controls
          path: install_dir/
