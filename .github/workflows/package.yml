name: Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            build-essential cmake debhelper dpkg-dev \
            qt6-base-dev qt6-declarative-dev \
            libgl1-mesa-dev

      - name: Build and install lingmo-theme
        run: |
          git clone --depth=1 https://github.com/Matrinsoft/lingmo-theme.git /tmp/lingmo-theme
          cmake -S /tmp/lingmo-theme -B /tmp/lingmo-theme/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/lingmo-theme/build --parallel
          cmake --install /tmp/lingmo-theme/build
          rm -rf /tmp/lingmo-theme

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../*.deb ../*.buildinfo ../*.changes artifacts/ 2>/dev/null || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-controls-deb
          path: artifacts/

  rpm:
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y cmake ninja-build rpm-build \
            qt6-qtbase-devel qt6-qtdeclarative-devel \
            mesa-libGL-devel

      - name: Build and install lingmo-theme
        run: |
          dnf install -y git
          git clone --depth=1 https://github.com/Matrinsoft/lingmo-theme.git /tmp/lingmo-theme
          cmake -S /tmp/lingmo-theme -B /tmp/lingmo-theme/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/lingmo-theme/build --parallel
          cmake --install /tmp/lingmo-theme/build
          rm -rf /tmp/lingmo-theme

      - name: Build RPM
        run: |
          mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cd .. && tar czf /tmp/rpmbuild/SOURCES/lingmo-controls-1.0.0.tar.gz \
            --transform='s,^lingmo-controls,lingmo-controls-1.0.0,' \
            lingmo-controls
          cd lingmo-controls
          cp rpm/lingmo-controls.spec /tmp/rpmbuild/SPECS/
          rpmbuild -ba /tmp/rpmbuild/SPECS/lingmo-controls.spec \
            --define "_topdir /tmp/rpmbuild"
          mkdir -p artifacts
          cp /tmp/rpmbuild/RPMS/**/*.rpm artifacts/ 2>/dev/null || true

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-controls-rpm
          path: artifacts/
