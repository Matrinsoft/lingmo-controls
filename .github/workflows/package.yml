name: Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        distro: [ubuntu-24.04, ubuntu-24.04-arm64]
      fail-fast: false

    runs-on: ${{ matrix.distro }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-quickcontrols2-dev \
            libgl1-mesa-dev \
            build-essential debhelper dpkg-dev

      - name: Build lingmo-theme
        run: |
          git clone --depth=1 https://github.com/LingmoOS/lingmo-theme.git
          cmake -S lingmo-theme -B lingmo-theme/build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr
          sudo cmake --build lingmo-theme/build
          sudo cmake --install lingmo-theme/build

      - name: Build Package
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON
          ninja
          DESTDIR=${{ github.workspace }}/package-root ninja install

      - name: Create Archive
        run: |
          cd ${{ github.workspace }}/package-root
          tar -czf ${{ github.workspace }}/lingmo-controls-${{ matrix.distro }}.tar.gz .

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.distro }}
          path: lingmo-controls-${{ matrix.distro }}.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: lingmo-controls-${{ matrix.distro }}.tar.gz
          generate_release_notes: true
